name: build

on:
  push:
    branches: [main]
    tags:     ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  SOURCE_SCRIPT: "EQOA Frontiers ISO Patch.py"
  BINARY_NAME:   "eqoa-frontiers-iso-patch"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: eqoa-frontiers-iso-patch-linux-x86_64
            executable_ext: ''
          - os: windows-latest
            artifact_name: eqoa-frontiers-iso-patch-windows-x86_64
            executable_ext: '.exe'
          - os: macos-latest
            artifact_name: eqoa-frontiers-iso-patch-macos-arm64
            executable_ext: ''

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build single-file executable
        shell: bash
        run: |
          pyinstaller \
            --onefile \
            --console \
            --noupx \
            --name "${BINARY_NAME}" \
            "${SOURCE_SCRIPT}"

      - name: Verify the executable runs
        shell: bash
        run: |
          set +e
          "./dist/${BINARY_NAME}${{ matrix.executable_ext }}"
          rc=$?
          set -e
          if [ "$rc" -ne 1 ]; then
            echo "Expected exit code 1 (usage), got $rc"
            exit 1
          fi
          echo "Smoke test passed."

      - name: Stage binary for upload
        shell: bash
        run: |
          mkdir -p out
          cp "dist/${BINARY_NAME}${{ matrix.executable_ext }}" \
             "out/${BINARY_NAME}${{ matrix.executable_ext }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: out/${{ env.BINARY_NAME }}${{ matrix.executable_ext }}
          if-no-files-found: error
          retention-days: 90

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Show what we got
        run: ls -lR artifacts

      - name: Stage release files with platform-specific names
        run: |
          mkdir -p release
          cp "artifacts/eqoa-frontiers-iso-patch-linux-x86_64/eqoa-frontiers-iso-patch"       "release/eqoa-frontiers-iso-patch-linux-x86_64"
          cp "artifacts/eqoa-frontiers-iso-patch-windows-x86_64/eqoa-frontiers-iso-patch.exe" "release/eqoa-frontiers-iso-patch-windows-x86_64.exe"
          cp "artifacts/eqoa-frontiers-iso-patch-macos-arm64/eqoa-frontiers-iso-patch"        "release/eqoa-frontiers-iso-patch-macos-arm64"
          ls -l release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          prerelease: false
