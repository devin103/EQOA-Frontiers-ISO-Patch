# Builds standalone executables of patch_dnas.py for Linux and Windows.
#
# Triggers:
#   - On every push/PR to main: builds and uploads as workflow artifacts
#     (download via the "Actions" tab in the GitHub UI; kept ~90 days).
#   - On pushing a tag matching v*.*.* (e.g. v1.0.0): builds AND creates a
#     GitHub Release with the executables attached.
#
# Manual trigger: also runnable from the Actions tab via "Run workflow".

name: build

on:
  push:
    branches: [main]
    tags:     ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:   # allow manual runs from the Actions tab

permissions:
  contents: write   # needed for creating GitHub Releases on tag pushes

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false   # one platform failing shouldn't cancel the others
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: patch_dnas-linux-x86_64
            executable_ext: ''
          - os: windows-latest
            artifact_name: patch_dnas-windows-x86_64
            executable_ext: '.exe'
          - os: macos-13         # Intel x86_64 runner
            artifact_name: patch_dnas-macos-x86_64
            executable_ext: ''
          - os: macos-latest     # Apple Silicon (arm64) runner
            artifact_name: patch_dnas-macos-arm64
            executable_ext: ''

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        # The script itself has no third-party deps (stdlib only), so
        # PyInstaller is the only thing we need to install.
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build single-file executable
        # --onefile      => one self-contained binary, no folder of files
        # --console      => keep the console window (CLI tool, not GUI)
        # --name ...     => sets the output binary name without extension
        # --strip        => smaller binaries on Linux (Windows ignores this)
        # --noupx        => skip UPX compression (UPX often triggers AV
        #                   false positives on Windows; binary stays a few
        #                   MB larger but won't get flagged)
        run: |
          pyinstaller --onefile --console --noupx --name patch_dnas patch_dnas.py

      - name: Verify the executable runs
        # Smoke test: invoke the binary with no args. The script prints its
        # usage and exits 1 (per the existing `if len(sys.argv) != 2` check),
        # so we expect exit code 1 here. We just want to confirm the binary
        # actually launches without crashing on missing libs or similar.
        shell: bash
        run: |
          set +e
          ./dist/patch_dnas${{ matrix.executable_ext }}
          rc=$?
          set -e
          if [ "$rc" -ne 1 ]; then
            echo "Expected exit code 1 (usage), got $rc"
            exit 1
          fi
          echo "Smoke test passed (binary launched and printed usage)."

      - name: Rename binary for artifact
        # The artifact name embeds the platform so users know which is
        # which. The binary inside keeps a clean "patch_dnas" name.
        shell: bash
        run: |
          mkdir -p out
          cp "dist/patch_dnas${{ matrix.executable_ext }}" \
             "out/patch_dnas${{ matrix.executable_ext }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: out/patch_dnas${{ matrix.executable_ext }}
          if-no-files-found: error
          retention-days: 90

  release:
    # Only run when a v*.*.* tag is pushed. Pulls down the artifacts the
    # build job uploaded and attaches them to a GitHub Release.
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show what we got
        run: ls -lR artifacts

      - name: Stage release files with platform-specific names
        # Each artifact contains a generic "patch_dnas[.exe]" -- we rename
        # them to include the platform/arch so users picking from the
        # release page can tell them apart.
        run: |
          mkdir -p release
          cp artifacts/patch_dnas-linux-x86_64/patch_dnas         release/patch_dnas-linux-x86_64
          cp artifacts/patch_dnas-windows-x86_64/patch_dnas.exe   release/patch_dnas-windows-x86_64.exe
          cp artifacts/patch_dnas-macos-x86_64/patch_dnas         release/patch_dnas-macos-x86_64
          cp artifacts/patch_dnas-macos-arm64/patch_dnas          release/patch_dnas-macos-arm64
          ls -l release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          # Don't mark prereleases automatically; bump to true if you tag
          # things like v1.0.0-beta.1 and want them flagged as prerelease.
          prerelease: false
